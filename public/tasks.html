<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Tasks — TaskFlow</title>
  <meta name="description" content="Track and manage all tasks across your projects."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="14" fill="url(#lg3)"/><path d="M14 18h20M14 24h14M14 30h10" stroke="white" stroke-width="2.5" stroke-linecap="round"/><circle cx="36" cy="30" r="6" fill="white" opacity="0.3"/><circle cx="36" cy="30" r="3" fill="white"/><defs><linearGradient id="lg3" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs></svg>
        <span>TaskFlow</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item" data-page="dashboard" href="/dashboard.html"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>Dashboard</a>
      <a class="nav-item" data-page="projects" href="/projects.html"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>Projects</a>
      <a class="nav-item active" data-page="tasks" href="/tasks.html"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>Tasks</a>
      <div class="nav-section-label" data-role="admin">Admin</div>
      <a class="nav-item" data-page="team" href="/team.html" data-role="admin"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>Team</a>
    </nav>
    <div class="sidebar-footer">
      <div class="dropdown">
        <div class="user-card" id="sidebarUser"></div>
        <div class="dropdown-menu" id="userDropdown" style="display:none;bottom:60px;top:auto">
          <button class="dropdown-item" onclick="window.location.href='/dashboard.html'"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/></svg>Dashboard</button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" onclick="logout()"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 001 1h10v-2H6V5h10V3H4a1 1 0 00-1 1z" clip-rule="evenodd"/></svg>Sign Out</button>
        </div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn-icon sidebar-toggle" onclick="openSidebar()"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg></button>
        <div class="page-title"><h1>Tasks</h1><p>Track and manage tasks across all projects</p></div>
      </div>
      <div class="page-actions">
        <div style="display:flex;gap:8px">
          <button id="viewList" class="btn-secondary" onclick="setView('list')" style="padding:8px 12px">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
          </button>
          <button id="viewKanban" class="btn-secondary" onclick="setView('kanban')" style="padding:8px 12px">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          </button>
        </div>
        <button class="btn-primary" onclick="openCreateTaskModal()"><svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>New Task</button>
      </div>
    </div>

    <!-- Filters -->
    <div style="padding:16px 32px 0">
      <div class="filter-bar">
        <div class="search-wrapper"><svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg><input id="searchTasks" placeholder="Search tasks..." oninput="filterTasks()" style="width:220px;padding:9px 12px 9px 36px"/></div>
        <select id="filterProject" onchange="filterTasks()" style="width:auto;padding:9px 12px"><option value="">All Projects</option></select>
        <select id="filterStatus" onchange="filterTasks()" style="width:auto;padding:9px 12px"><option value="">All Status</option><option value="todo">To Do</option><option value="in_progress">In Progress</option><option value="review">Review</option><option value="done">Done</option></select>
        <select id="filterPriority" onchange="filterTasks()" style="width:auto;padding:9px 12px"><option value="">All Priority</option><option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
        <label style="display:flex;align-items:center;gap:6px;font-size:0.875rem;color:var(--text2);cursor:pointer"><input type="checkbox" id="filterOverdue" onchange="filterTasks()" /> <span>Overdue only</span></label>
      </div>
    </div>

    <div class="page-body">
      <!-- List View -->
      <div id="listView">
        <div class="section-card">
          <div class="section-body" id="taskListBody"></div>
        </div>
      </div>
      <!-- Kanban View -->
      <div id="kanbanView" style="display:none">
        <div class="kanban-board" id="kanbanBoard"></div>
      </div>
    </div>
  </main>

  <!-- Task Detail Panel -->
  <div id="taskDetailOverlay" style="display:none" onclick="closeTaskDetail()"></div>
  <div id="taskDetailPanel" class="task-detail-panel" style="display:none"></div>
</div>

<script src="/js/app.js"></script>
<script src="/js/tasks.js"></script>
</body>
</html>
