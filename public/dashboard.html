<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — TaskFlow</title>
  <meta name="description" content="Team Task Manager Dashboard — Track projects, tasks, and team progress."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="14" fill="url(#lg)"/>
          <path d="M14 18h20M14 24h14M14 30h10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="36" cy="30" r="6" fill="white" opacity="0.3"/><circle cx="36" cy="30" r="3" fill="white"/>
          <defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
        <span>TaskFlow</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item active" data-page="dashboard" href="/dashboard.html">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-page="projects" href="/projects.html">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
        Projects
      </a>
      <a class="nav-item" data-page="tasks" href="/tasks.html">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
        Tasks
        <span class="nav-badge" id="overdueNavBadge" style="display:none">0</span>
      </a>

      <div class="nav-section-label" data-role="admin">Admin</div>
      <a class="nav-item" data-page="team" href="/team.html" data-role="admin">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
        Team
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="dropdown">
        <div class="user-card" id="sidebarUser"></div>
        <div class="dropdown-menu" id="userDropdown" style="display:none;bottom:60px;top:auto">
          <button class="dropdown-item" onclick="openProfileModal()">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
            Profile Settings
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" onclick="logout()">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V7.414l-4-4H3zm6 8a1 1 0 10-2 0v3a1 1 0 102 0v-3zm2-3a1 1 0 011 1v5a1 1 0 11-2 0v-5a1 1 0 011-1z" clip-rule="evenodd"/></svg>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn-icon sidebar-toggle" onclick="openSidebar()">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
        </button>
        <div class="page-title">
          <h1 id="welcomeTitle">Welcome back 👋</h1>
          <p>Here's what's happening with your team today.</p>
        </div>
      </div>
      <div class="page-actions">
        <button class="btn-primary" onclick="window.location.href='/tasks.html?new=1'">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
          New Task
        </button>
      </div>
    </div>

    <div class="page-body">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="skeleton" style="height:108px;border-radius:12px"></div>
        <div class="skeleton" style="height:108px;border-radius:12px"></div>
        <div class="skeleton" style="height:108px;border-radius:12px"></div>
        <div class="skeleton" style="height:108px;border-radius:12px"></div>
      </div>

      <!-- Dashboard grid -->
      <div class="dashboard-grid" id="dashboardGrid" style="display:none">
        <!-- My Tasks -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
              My Tasks
            </div>
            <a href="/tasks.html" class="btn-ghost" style="font-size:0.8rem">View all →</a>
          </div>
          <div class="section-body" id="myTasksList"></div>
        </div>

        <!-- Overdue Tasks -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title" style="color:#f87171">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
              Overdue Tasks
            </div>
          </div>
          <div class="section-body" id="overdueTasksList"></div>
        </div>

        <!-- Activity Feed -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
              Recent Activity
            </div>
          </div>
          <div class="section-body" id="activityFeed"></div>
        </div>

        <!-- Projects overview -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
              Project Progress
            </div>
            <a href="/projects.html" class="btn-ghost" style="font-size:0.8rem">View all →</a>
          </div>
          <div class="section-body" id="projectProgress"></div>
        </div>

        <!-- Team stats (admin only) -->
        <div class="section-card span-2" data-role="admin" id="teamStatsCard" style="display:none">
          <div class="section-header">
            <div class="section-title">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
              Team Performance
            </div>
          </div>
          <div class="section-body">
            <table class="team-table" id="teamTable">
              <thead><tr><th>Member</th><th>Role</th><th>Assigned</th><th>Completed</th><th>Progress</th></tr></thead>
              <tbody id="teamTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Profile Modal Template (injected by JS) -->
<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
